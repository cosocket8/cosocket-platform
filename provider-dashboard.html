<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSOCKET - Provider Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 100px auto 0;
            padding: 2rem;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--gray);
            padding: 1.5rem;
            border-radius: 10px;
        }
        
        .stat-card h3 {
            font-size: 2rem;
            color: var(--primary);
        }
        
        .bookings-table {
            background: var(--gray);
            border-radius: 10px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--light-gray);
        }
        
        th {
            background: var(--primary);
            color: var(--white);
        }
        
        .status {
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        
        .status-pending { background: var(--secondary); color: var(--dark); }
        .status-confirmed { background: #4caf50; color: white; }
        .status-completed { background: #2196f3; color: white; }
        
        .logout-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .machine-list {
            margin-top: 2rem;
        }
        
        .machine-item {
            background: var(--gray);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .availability-toggle {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>CO<span>SOCKET</span></h1>
                <p>Provider Dashboard</p>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>
    
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Welcome, <span id="ownerName">Provider</span></h1>
            <button class="btn-primary" onclick="addNewMachine()">+ Add New Machine</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalMachines">0</h3>
                <p>Your Machines</p>
            </div>
            <div class="stat-card">
                <h3 id="totalBookings">0</h3>
                <p>Total Bookings</p>
            </div>
            <div class="stat-card">
                <h3 id="totalEarnings">₹0</h3>
                <p>Total Earnings</p>
            </div>
        </div>
        
        <h2>Your Machines</h2>
        <div id="yourMachines" class="machine-list"></div>
        
        <h2 style="margin-top: 2rem;">Recent Bookings</h2>
        <div class="bookings-table">
            <table>
                <thead>
                    <tr><th>Machine</th><th>Customer</th><th>Dates</th><th>Amount</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="bookingsList"></tbody>
            </table>
        </div>
    </div>
    
    <div id="addMachineModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddMachineModal()">&times;</span>
            <h2>Add New Machine</h2>
            <form id="addMachineForm">
                <div class="form-group">
                    <label>Machine Name *</label>
                    <input type="text" id="newMachineName" required>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="newMachineCategory" required>
                        <option value="metal">Fabrication & Metalworking</option>
                        <option value="textile">Textile Processing</option>
                        <option value="food">Food & Agro Processing</option>
                        <option value="print">Printing & Packaging</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Daily Rent (₹) *</label>
                    <input type="number" id="newMachinePrice" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="newMachineDesc" rows="3"></textarea>
                </div>
                <button type="submit">Add Machine</button>
            </form>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadDashboard();
        });
        
        function checkAuth() {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = JSON.parse(user);
            document.getElementById('ownerName').textContent = currentUser.phone;
        }
        
        async function loadDashboard() {
            await loadYourMachines();
            await loadBookings();
            await loadStats();
        }
        
        async function loadYourMachines() {
            const { data, error } = await supabase
                .from('machines')
                .select('*')
                .eq('owner_phone', currentUser.phone);
            
            if (error) {
                console.error('Error loading machines:', error);
                return;
            }
            
            const container = document.getElementById('yourMachines');
            if (data && data.length > 0) {
                container.innerHTML = data.map(machine => `
                    <div class="machine-item">
                        <div>
                            <strong>${machine.name}</strong><br>
                            ₹${machine.price}/day | ${machine.category}
                        </div>
                        <div>
                            <span>Status: ${machine.status || 'available'}</span>
                            <button class="availability-toggle" onclick="toggleAvailability(${machine.id})">
                                ${machine.status === 'available' ? 'Mark Unavailable' : 'Mark Available'}
                            </button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p>No machines listed yet. Click "Add New Machine" to get started.</p>';
            }
        }
        
        async function loadBookings() {
            const { data, error } = await supabase
                .from('bookings')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('Error loading bookings:', error);
                return;
            }
            
            const tbody = document.getElementById('bookingsList');
            if (data && data.length > 0) {
                tbody.innerHTML = data.map(booking => `
                    <tr>
                        <td>${booking.machine_name}</td>
                        <td>${booking.customer_name}<br><small>${booking.customer_phone}</small></td>
                        <td>${booking.start_date} to ${booking.end_date}</td>
                        <td>₹${calculateAmount(booking)}</td>
                        <td><span class="status status-${booking.status}">${booking.status}</span></td>
                        <td>
                            <button onclick="updateBookingStatus(${booking.id}, 'confirmed')">Confirm</button>
                            <button onclick="updateBookingStatus(${booking.id}, 'completed')">Complete</button>
                        </td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="6">No bookings yet</td></tr>';
            }
        }
        
        async function loadStats() {
            const { data: machines } = await supabase
                .from('machines')
                .select('*')
                .eq('owner_phone', currentUser.phone);
            
            const { data: bookings } = await supabase
                .from('bookings')
                .select('*')
                .eq('status', 'confirmed');
            
            document.getElementById('totalMachines').textContent = machines?.length || 0;
            document.getElementById('totalBookings').textContent = bookings?.length || 0;
            
            let totalEarnings = 0;
            bookings?.forEach(booking => {
                totalEarnings += calculateAmount(booking);
            });
            document.getElementById('totalEarnings').textContent = `₹${totalEarnings}`;
        }
        
        function calculateAmount(booking) {
            const start = new Date(booking.start_date);
            const end = new Date(booking.end_date);
            const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
            return days * (booking.daily_rate || 2000);
        }
        
        function addNewMachine() {
            document.getElementById('addMachineModal').style.display = 'flex';
        }
        
        function closeAddMachineModal() {
            document.getElementById('addMachineModal').style.display = 'none';
            document.getElementById('addMachineForm').reset();
        }
        
        document.getElementById('addMachineForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const machineData = {
                name: document.getElementById('newMachineName').value,
                category: document.getElementById('newMachineCategory').value,
                price: parseInt(document.getElementById('newMachinePrice').value),
                description: document.getElementById('newMachineDesc').value,
                owner_phone: currentUser.phone,
                owner_name: currentUser.phone,
                status: 'available',
                created_at: new Date().toISOString()
            };
            
            const { data, error } = await supabase
                .from('machines')
                .insert([machineData])
                .select();
            
            if (error) {
                showToast('Error adding machine', 'error');
                console.error(error);
            } else {
                showToast('Machine added successfully!', 'success');
                closeAddMachineModal();
                loadDashboard();
            }
        });
        
        async function toggleAvailability(machineId) {
            const { data, error } = await supabase
                .from('machines')
                .update({ status: 'unavailable' })
                .eq('id', machineId);
            
            if (error) {
                showToast('Error updating status', 'error');
            } else {
                showToast('Status updated', 'success');
                loadDashboard();
            }
        }
        
        async function updateBookingStatus(bookingId, status) {
            const { data, error } = await supabase
                .from('bookings')
                .update({ status: status })
                .eq('id', bookingId);
            
            if (error) {
                showToast('Error updating booking', 'error');
            } else {
                showToast(`Booking ${status}!`, 'success');
                loadDashboard();
            }
        }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
